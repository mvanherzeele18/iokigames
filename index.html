<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ioki Games</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="head.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#BFEFFF">
    
    <!-- iOS ondersteuning -->
    <link rel="apple-touch-icon" href="icons/logo-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

</head>
<body>

    <div class="container">
        <div class="logo">
    <img src="assets/images/logo.png" alt="Ioki Games Logo">
</div>
        <h1>Ioki Games</h1>

    <!-- Login -->

    <div id="login-card">

        <p class="subtitle">

            Log in met je Google-account.

        </p>

        <button id="google-login">

            Inloggen met Google

        </button>

    </div>

    <!-- Home -->

    <div
        id="home"
        class="hidden"
    >

        <p class="subtitle">

            Kies je leeftijd

        </p>

        <div class="age-grid">

            <a href="age-2/index.html" class="age-button">

                <span class="emoji">🍼</span>

                <span>2 jaar</span>

            </a>

            <a href="age-3/index.html" class="age-button">

                <span class="emoji">🧸</span>

                <span>3 jaar</span>

            </a>

            <a href="age-4/index.html" class="age-button">

                <span class="emoji">🎨</span>

                <span>4 jaar</span>

            </a>

        </div>

        <br>

        <button id="account-button" class="button">

            Mijn account

        </button>

        <button
            id="logout-button"
            class="secondary"
        >

            Afmelden

        </button>

    </div>

</div>

<script type="module" src="home.js"></script>

<script src="script.js"></script>

<script>

createClouds();

</script>

<script>

if ("serviceWorker" in navigator){

    navigator.serviceWorker.register("sw.js");

}

</script>

</body>
</html>
