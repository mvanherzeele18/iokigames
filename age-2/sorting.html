<!DOCTYPE html>

<html lang="nl">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sorteren - Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="sorting.css">

</head>

<body>

<div id="game">

    <a href="index.html" class="back-button">⬅</a>

    <div class="logo">
        Ioki Games
    </div>

    <div id="object-container">
        <img id="object" src="" draggable="false">
    </div>

    <div id="baskets">
      
        <div class="basket red" data-color="red">
            ❤️
        </div>

        <div class="basket yellow" data-color="yellow">
            💛
        </div>

        <div class="basket blue" data-color="blue">
            💙
        </div>

    </div>

</div>

<script src="../script.js"></script>

<script>

createClouds(5,"../assets/images/cloud.png");

</script>

<script type="module">
    import { checkGameAccess } from "../guard.js";
    import { startGameTimer } from "../timer.js";

    checkGameAccess("sorting").then(access => {
        if (!access) return;

        startGameTimer();

        import("./sorting.js");
    });
</script>

</body>

</html>
