<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 jaar - Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
</head>
<body>

<div class="container">
    <div class="logo">
    <img src="../assets/images/logo.png" alt="Ioki Games Logo">
</div>
    <h1>🍼 2 jaar</h1>

    <p class="subtitle">
        Kies een spelletje!
    </p>

    <div class="age-grid">

        <a href="balloons.html" class="age-button" data-game="balloons">
            <span class="emoji">🎈</span>
            <span>Ballonnen</span>
        </a>

        <a href="animals.html" class="age-button" data-game="animals">
            <span class="emoji">🐶</span>
            <span>Dieren</span>
        </a>

        <a href="colors.html" class="age-button" data-game="colors">
            <span class="emoji">🌈</span>
            <span>Kleuren</span>
        </a>

        <a href="bubbles.html" class="age-button" data-game="bubbles">
            <span class="emoji">🫧</span>
            <span>Bubbels</span>
        </a>
        
        <a href="sorting.html" class="age-button" data-game="sorting">
            <span class="emoji">📦</span>
            Sorteren
        </a>
        <!--
        <a href="numbers.html" class="age-button" data-game="numbers">
            <span class="emoji">🔢</span>
            Nummers
        </a>

        <a href="shapes.html" class="age-button" data-game="shapes">
            <span class="emoji">🔴</span>
            Vormen
        </a>
        -->

    </div>

    <br><br>

    <a href="../index.html" class="age-button">
        ⬅️ Terug
    </a>

</div>
<script src="../script.js"></script>

<script>
    createClouds(6, "../assets/images/cloud.png");
</script>
<script type="module">
import { auth, db, onAuthStateChanged, doc, getDoc } from "../firebase.js";

onAuthStateChanged(auth, async user => {

    if (!user) {
        window.location.href = "../index.html";
        return;
    }

    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.data();

    const allowedGames = data.games || {};

    document.querySelectorAll(".age-button[data-game]").forEach(btn => {

        const gameName = btn.dataset.game;

        if (!allowedGames[gameName]) {
            btn.style.display = "none";   // verberg spel
        }

    });

});
</script>
</body>
</html>
