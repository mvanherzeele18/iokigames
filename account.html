<!DOCTYPE html>

<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Mijn account</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="logo">

        <img
            src="assets/images/logo.png"
            alt="Ioki Games"
        >

    </div>

    <h1>Mijn account</h1>

    <div class="card">

        <h2 id="name">

            Laden...

        </h2>

        <p id="email"></p>

    </div>

    <div class="card">

        <h3>

            🆔 Profile-ID

        </h3>

        <h1 id="profile-id">

            ---- ----

        </h1>

        <button id="copy-button" class="button">

            📋 Kopiëren

        </button>

    </div>

    <div class="card">

        <h3>

            ⏰ Schermtijd

        </h3>

        <h2 id="screen-time">

            Laden...

        </h2>

    </div>

    <div class="card">

        <h3>

            🎮 Beschikbare spellen

        </h3>

        <div id="games-list">

        </div>

    </div>

    <div class="card">

        <h3>

            👨‍👩‍👧 Voor ouders

        </h3>

        <p>

            Geef je Profile-ID aan je ouders.

        </p>

        <br>

        <a

            href="https://mvanherzeele18.github.io/iokiparent/"

            target="_blank"

        >

            mvanherzeele18.github.io/iokiparent

        </a>

    </div>

    <button
        id="back-button"
        class="button secondary">

        ← Terug

    </button>

</div>

<script
    type="module"
    src="account.js"
></script>

</body>

</html>
