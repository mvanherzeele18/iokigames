<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 jaar - Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
</head>
<body>

<div class="container">
    <div class="logo">
    <img src="../assets/images/logo.png" alt="Ioki Games Logo">
</div>
    <h1>🚀 5 jaar</h1>

    <p class="subtitle">
        Kies een spelletje!
    </p>

    <div class="age-grid">
        
        <a href="logic.html" class="age-button" data-game="logic">
            <span class="emoji">🧠</span>
            <span>Logica</span>
        </a>

        <a href="bowling.html" class="age-button" data-game="bowling">
            <span class="emoji">🎳</span>
            <span>Bowling</span>
        </a>
        
        <a href="bird.html" class="age-button" data-game="bird">
            <span class="emoji">🐦</span>
            <span>Vogel</span>
        </a>
        
        <a href="dino.html" class="age-button" data-game="dino">
            <span class="emoji">🦖</span>
            <span>Dino</span>
        </a>
        
    </div>

    <br><br>

    <a href="../index.html" class="age-button">
        ⬅️ Terug
    </a>

</div>
<script src="../script.js"></script>

<script>
    createClouds(6, "../assets/images/cloud.png");
</script>
<script type="module">
import { auth, db, onAuthStateChanged, doc, getDoc } from "../firebase.js";

onAuthStateChanged(auth, async user => {

    if (!user) {
        window.location.href = "../index.html";
        return;
    }

    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.data();

    const allowedGames = data.games || {};

    document.querySelectorAll(".age-button[data-game]").forEach(btn => {

        const gameName = btn.dataset.game;

        if (!allowedGames[gameName]) {
            btn.style.display = "none";
        }

    });

});
</script>
</body>
</html>
