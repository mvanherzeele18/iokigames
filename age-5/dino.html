<!DOCTYPE html>
<html lang="nl">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dino – Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="dino.css">
</head>
<body>

<div id="game">

    <a href="index.html" class="back-button">⬅</a>

    <div class="logo">
        Ioki Games
    </div>

    <div id="track">
        <div id="dino">🦕</div>
        <div id="ground"></div>
        <div id="obstacles"></div>
    </div>

    <div id="controls">
        <button id="jumpButton" class="control-button">SPRING!</button>
    </div>

    <div id="status">
        <span id="scoreLabel">Score: <span id="score">0</span></span>
    </div>

</div>

<script src="../script.js"></script>

<script>
    createClouds(6, "../assets/images/cloud.png");
</script>

<script type="module">
    import { checkGameAccess } from "../guard.js";
    import { startGameTimer } from "../timer.js";

    checkGameAccess("dino").then(access => {

        if (!access) return;

        startGameTimer();

        import("./dino.js");

    });
</script>

</body>
</html>
