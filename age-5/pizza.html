<!DOCTYPE html>
<html lang="nl">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pizza - Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="pizza.css">
    <link rel="icon" href="../favicon.ico">

</head>
<body>

<div id="game">

    <a href="index.html" class="back-button">⬅</a>

    <div class="logo">
        Ioki Games
    </div>

    <div id="order-box">

        🍕 Ik wil een pizza met...

        <div id="order"></div>

    </div>

    <div id="pizza-area">

        <div id="pizza">

            <!-- toppings komen hier -->

        <!-- ingrediënten komen via JS -->

    </div>

<script src="../script.js"></script>

<script>

createClouds(6,"../assets/images/cloud.png");

</script>

<script type="module">

import { checkGameAccess } from "../guard.js";
import { startGameTimer } from "../timer.js";

checkGameAccess("pizza").then(access=>{

    if(!access) return;

    startGameTimer();

    import("./pizza.js");

});

</script>
