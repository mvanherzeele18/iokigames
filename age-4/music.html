<!DOCTYPE html>
<html lang="nl">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Muziek - Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="music.css">

</head>

<body>

<div id="game">

    <a href="index.html" class="back-button">⬅</a>

    <div class="logo">
        Ioki Games
    </div>

    <div id="keys">

        <button class="key red" data-note="do">Do</button>
        <button class="key orange" data-note="re">Re</button>
        <button class="key yellow" data-note="mi">Mi</button>
        <button class="key green" data-note="fa">Fa</button>

        <button class="key blue" data-note="sol">Sol</button>
        <button class="key indigo" data-note="la">La</button>
        <button class="key purple" data-note="si">Si</button>
        <button class="key pink" data-note="do2">Do</button>

    </div>

</div>

<script src="../script.js"></script>

<script>

createClouds(5, "../assets/images/cloud.png");

</script>

<script type="module">
    import { checkGameAccess } from "../guard.js";
    import { startGameTimer } from "../timer.js";

    checkGameAccess("music").then(access => {
        if (!access) return;

        startGameTimer();

        import("./music.js");
    });
</script>

</body>

</html>
