<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 jaar - Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
</head>
<body>

<div class="container">
    <div class="logo">
    <img src="../assets/images/logo.png" alt="Ioki Games Logo">
</div>
    <h1>🎨 4 jaar</h1>

    <p class="subtitle">
        Kies een spelletje!
    </p>

    <div class="age-grid">
    
        <a href="train.html" class="age-button" data-game="train">
            <span class="emoji">🚂</span>
            <span>Trein</span>
        </a>
    
        <a href="caterpillar.html" class="age-button" data-game="caterpillar">
            <span class="emoji">🐛</span>
            <span>Rups</span>
        </a>
    
        <a href="music.html" class="age-button" data-game="music">
            <span class="emoji">🎵</span>
            <span>Muziek</span>
        </a>
    
        <a href="fruit.html" class="age-button" data-game="fruit">
            <span class="emoji">🍎</span>
            <span>Fruit</span>
        </a>
        
        <a href="pattern.html" class="age-button" data-game="pattern">
            <span class="emoji">🕹️</span>
            Patroon
        </a>

        <a href="cut.html" class="age-button" data-game="cut">
            <!--<span class="new-label">Nieuw!</span>-->
            <span class="emoji">🍉</span>
            Snijden
        </a>
        
    </div>

    <br><br>

    <a href="../index.html" class="age-button">
        ⬅️ Terug
    </a>

</div>
<script src="../script.js"></script>

<script>
    createClouds(6, "../assets/images/cloud.png");
</script>
<script type="module">
import { auth, db, onAuthStateChanged, doc, getDoc } from "../firebase.js";

onAuthStateChanged(auth, async user => {

    if (!user) {
        window.location.href = "../index.html";
        return;
    }

    const snap = await getDoc(doc(db, "users", user.uid));
    const data = snap.data();

    const allowedGames = data.games || {};

    document.querySelectorAll(".age-button[data-game]").forEach(btn => {

        const gameName = btn.dataset.game;

        if (!allowedGames[gameName]) {
            btn.style.display = "none";
        }

    });

});
</script>
</body>
</html>
