<!DOCTYPE html>

<html lang="nl">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Patroon - Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="pattern.css">

</head>

<body>

<div id="game">

    <a href="index.html" class="back-button">⬅</a>

    <div class="logo">
        Ioki Games
    </div>

    <button id="start-button">

        ▶ Start

    </button>

    <div id="board">

        <button class="color-button red" data-color="red"></button>

        <button class="color-button blue" data-color="blue"></button>

        <button class="color-button green" data-color="green"></button>

        <button class="color-button yellow" data-color="yellow"></button>

    </div>

</div>

<script src="../script.js"></script>

<script>

createClouds(5,"../assets/images/cloud.png");

</script>

<script type="module">
    import { checkGameAccess } from "../guard.js";
    import { startGameTimer } from "../timer.js";

    checkGameAccess("pattern").then(access => {
        if (!access) return;

        startGameTimer();

        import("./pattern.js");
    });
</script>

</body>

</html>
