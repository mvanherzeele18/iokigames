<!DOCTYPE html>
<html lang="nl">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trein - Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="train.css">

</head>

<body>

<div id="game">

    <!-- Terug -->
    <a href="index.html" class="back-button">⬅</a>

    <!-- Logo -->
    <div class="logo">
        Ioki Games
    </div>

    <!-- Voorbeeldtrein -->
    
    <div id="example-area">
    
        <div id="example-train">
    
            <img
                id="example-locomotive"
                src="../assets/images/train/locomotive.png"
                alt="Locomotief">
    
        </div>
    
    </div>
    
    <!-- Trein -->
    
    <div id="train-area">
    
        <div id="train">
    
            <img
                id="locomotive"
                src="../assets/images/train/locomotive.png"
                alt="Locomotief">
    
        </div>
    
    </div>

    <!-- Knoppen -->
    <div id="controls">

        <button class="wagon-button" data-color="red">
            <img src="../assets/images/train/wagon-red.png" alt="Rode wagon">
        </button>

        <button class="wagon-button" data-color="blue">
            <img src="../assets/images/train/wagon-blue.png" alt="Blauwe wagon">
        </button>

        <button class="wagon-button" data-color="green">
            <img src="../assets/images/train/wagon-green.png" alt="Groene wagon">
        </button>

        <button class="wagon-button" data-color="yellow">
            <img src="../assets/images/train/wagon-yellow.png" alt="Gele wagon">
        </button>

        <button id="start-button">

            ▶ Start

        </button>

    </div>

</div>

<script src="../script.js"></script>

<script>

createClouds(5, "../assets/images/cloud.png");

</script>

<script type="module">
    import { checkGameAccess } from "../guard.js";

    checkGameAccess("train").then(access => {
        if (!access) return;

        import("./train.js");
    });
</script>

</body>

</html>
