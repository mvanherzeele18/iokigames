<!DOCTYPE html>

<html lang="nl">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Memory - Ioki Games</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="memory.css">

</head>

<body>

<div id="game">

    <a href="index.html" class="back-button">⬅</a>

    <div class="logo">

        Ioki Games

    </div>

    <!-- Thema kiezen -->

    <div id="theme-screen" class="screen">

        <h1>Kies een thema</h1>

        <div class="button-grid">

            <button class="choice-button" data-theme="animals">
                🐶<span>Dieren</span>
            </button>

            <button class="choice-button" data-theme="vehicles">
                🚗<span>Wagens</span>
            </button>

            <button class="choice-button" data-theme="fruit">
                🍎<span>Fruit</span>
            </button>

            <button class="choice-button" data-theme="toys">
                🧸<span>Speelgoed</span>
            </button>

            <button class="choice-button" data-theme="food">
                🍕<span>Eten</span>
            </button>

        </div>

    </div>

    <!-- Aantal kaarten -->

    <div id="amount-screen" class="screen hidden">

        <h1>Aantal kaarten</h1>

        <div class="button-grid">

            <button class="choice-button amount" data-cards="6">
                6
            </button>

            <button class="choice-button amount" data-cards="8">
                8
            </button>

            <button class="choice-button amount" data-cards="10">
                10
            </button>

        </div>

    </div>

    <!-- Memory -->

    <div id="memory-board" class="hidden"></div>

</div>

<script src="../script.js"></script>

<script>

createClouds(5,"../assets/images/cloud.png");

</script>

<script src="memory.js"></script>

</body>

</html>
